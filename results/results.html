<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Fill - Image Descriptions</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════════
       Design tokens - copied verbatim from sidepanel.css so the results
       page reads as a continuation of the side panel, not a separate app.
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      --bg:           #f8fafc;
      --card:         #ffffff;
      --card-hover:   #fbfdff;

      --border:        #e6e8ee;
      --border-strong: #d4d8e0;

      --text:        #0f1729;
      --text-muted:  #5b667a;
      --text-faint:  #97a1b3;

      --primary:        #2466eb;
      --primary-hover:  #1e54c9;
      --primary-soft:   #eef4ff;

      --success:       #10b981;
      --success-soft:  #d1fae5;
      --warning:       #f59e0b;
      --warning-soft:  #fef3c7;
      --danger:        #ef4444;
      --danger-soft:   #fee2e2;

      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow:    0 4px 14px rgba(15, 23, 42, 0.06);

      --radius:    14px;
      --radius-sm: 10px;

      --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI',
                   Roboto, Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { min-height: 100vh; }

    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; }
    h1, h2, h3 { font-weight: 600; letter-spacing: -0.2px; }

    /* ── Top bar (matches sidepanel.css .top-bar exactly) ────────── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      position: sticky; top: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 30px; height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      color: #fff;
      display: grid; place-items: center;
      box-shadow: 0 2px 6px rgba(36, 102, 235, 0.28);
    }
    .brand h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }

    /* ── Page wrapper ─────────────────────────────────────────────── */
    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 40px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── Cards (verbatim from sidepanel .card) ────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    /* Detection-style header card - mirrors the side-panel "DETECTED PAGE"
       card the user pointed to in the screenshot. */
    .detection-card { padding: 16px; }
    .detection-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
    }
    .detection-left { min-width: 0; flex: 1; }
    .detection-label {
      font-size: 10.5px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .detection-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .detection-url {
      font-size: 11.5px;
      color: var(--text-faint);
      margin-top: 6px;
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      word-break: break-all;
    }

    /* Badge pill - exact copy of sidepanel .badge.badge-success */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-success { background: var(--success-soft); color: #047857; }
    .badge-danger  { background: var(--danger-soft);  color: #b91c1c; }
    .badge-idle    { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

    /* Survey-meta card (mirrors the side-panel .survey-meta-card) */
    .survey-meta-card { padding: 12px 16px; }
    .meta-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0;
    }
    .meta-row + .meta-row { border-top: 1px solid var(--border); }
    .meta-label {
      font-size: 10.5px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 700;
      min-width: 70px;
      flex-shrink: 0;
    }
    .meta-value {
      font-size: 13.5px;
      color: var(--text);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Stats pill row */
    .stats-row { padding: 14px 16px; }
    .stats-pills {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.0px;
      text-transform: uppercase;
    }
    .stat-pill.total     { background: var(--primary-soft); color: var(--primary); }
    .stat-pill.correct   { background: var(--success-soft); color: #047857; }
    .stat-pill.incorrect { background: var(--danger-soft);  color: #b91c1c; }
    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }

    /* ── Result grid + card ───────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: border-color 150ms, transform 150ms, box-shadow 150ms;
      animation: card-in 240ms ease-out both;
      display: flex; flex-direction: column;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .card-image {
      position: relative;
      width: 100%;
      height: 200px;
      background: var(--bg);
      overflow: hidden;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 200ms;
    }
    .card-image:hover img { transform: scale(1.02); }

    .order-badge {
      position: absolute;
      top: 10px; left: 10px;
      padding: 4px 10px;
      background: rgba(15, 23, 42, 0.78);
      color: #fff;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      backdrop-filter: blur(4px);
    }

    .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 0; }

    .label-row {
      display: flex; align-items: baseline; gap: 10px;
      padding: 6px 0;
    }
    .label-row + .label-row { border-top: 1px dashed var(--border); }
    .label-tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-faint);
      font-weight: 700;
      min-width: 60px;
      flex-shrink: 0;
    }
    .label-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
    }

    .label-changed-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0 4px;
      border-top: 1px dashed var(--border);
    }
    .label-changed-row .badge {
      padding: 3px 10px;
      letter-spacing: 1.0px;
    }

    .description-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .desc-label {
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .desc-text {
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.5;
    }

    .photo-id-text {
      font-size: 10px;
      color: var(--text-faint);
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      margin-top: 10px;
      word-break: break-all;
    }

    /* ── Loading / empty states ──────────────────────────────────── */
    .loading-container {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }
    .loading-container .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-container p { color: var(--text-muted); font-size: 14px; }

    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      color: var(--text-faint);
      margin-bottom: 14px;
    }
    .empty-state p { font-size: 15px; font-weight: 600; color: var(--text); }
    .empty-state span { font-size: 12.5px; margin-top: 4px; }

    /* ── Scrollbar polish ────────────────────────────────────────── */
    body::-webkit-scrollbar { width: 10px; }
    body::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 999px;
    }
    body::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

  <!-- ═════════ TOP BAR ═════════ -->
  <header class="top-bar">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7"/>
          <polyline points="21 4 21 10 15 10"/>
        </svg>
      </span>
      <h1>Smart&nbsp;Fill</h1>
    </div>
  </header>

  <!-- ═════════ LOADING ═════════ -->
  <div id="loadingState" class="loading-container">
    <div class="spinner"></div>
    <p>Waiting for results data…</p>
  </div>

  <!-- ═════════ RESULTS ═════════ -->
  <div id="resultsContainer" class="page" style="display: none;">

    <!-- Detection-style header (matches the side panel's DETECTED PAGE card) -->
    <div class="card detection-card">
      <div class="detection-row">
        <div class="detection-left">
          <div class="detection-label">Image Description Results</div>
          <div class="detection-name" id="rResultsHeading">Order Photos - AI Verification</div>
          <div class="detection-url" id="rResultsCount">-</div>
        </div>
        <span id="rOverallBadge" class="badge badge-success">VERIFIED</span>
      </div>
    </div>

    <!-- Survey metadata card -->
    <div class="card survey-meta-card">
      <div class="meta-row">
        <span class="meta-label">Survey</span>
        <span id="rSurvey" class="meta-value">-</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Insured</span>
        <span id="rInsured" class="meta-value">-</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Policy</span>
        <span id="rPolicy" class="meta-value">-</span>
      </div>
    </div>

    <!-- Stats pills -->
    <div class="card stats-row">
      <div class="stats-pills">
        <span id="statTotal"     class="stat-pill total"><span class="stat-dot"></span><span id="statTotalText"></span></span>
        <span id="statCorrect"   class="stat-pill correct"><span class="stat-dot"></span><span id="statCorrectText"></span></span>
        <span id="statIncorrect" class="stat-pill incorrect"><span class="stat-dot"></span><span id="statIncorrectText"></span></span>
      </div>
    </div>

    <!-- Result grid -->
    <div id="resultsGrid" class="grid"></div>
  </div>

  <script src="results.js"></script>
</body>
</html>
